<body>
  <h2>Connecting to QuickBooks...</h2>
  <div class="loader"></div>
  <p>Please wait while we complete your authorization.</p>
  <p id="status"></p>
  <script>
    // Grab the code and realmId from the URL QuickBooks sent us to
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const realmId = params.get('realmId');
    const state = params.get('state');
    const error = params.get('error');

```
if (error) {
  document.querySelector('h2').textContent = 'Authorization Failed';
  document.getElementById('status').textContent = 'Error: ' + error;
} else if (code && realmId) {
  // Relay to local QBO tool
  const localUrl = `http://localhost:8080/callback?code=${encodeURIComponent(code)}&realmId=${encodeURIComponent(realmId)}&state=${encodeURIComponent(state || '')}`;
  document.getElementById('status').textContent = 'Authorization received. Completing connection...';
  // Redirect to local server
  window.location.href = localUrl;
} else {
  document.querySelector('h2').textContent = 'Something went wrong';
  document.getElementById('status').textContent = 'No authorization code received. Please try again.';
}
